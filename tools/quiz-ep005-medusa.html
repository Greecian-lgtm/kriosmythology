<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quiz: How Well Do You Know Medusa? | Krios Mythology</title>
<meta name="description" content="Test your knowledge of Medusa from Greek mythology. 5 questions based on primary sources, not textbooks.">
<meta property="og:title" content="I scored _/5 on the Medusa quiz — Krios Mythology">
<meta property="og:url" content="https://kriosmythology.com/tools/quiz-ep005-medusa.html">
<style>:root{--bg:#0a0806;--text:#e8d5a0;--gold:#c9a84c;--white:#f5f0e8;--dim:#8a7430;--correct:#4a7c59;--wrong:#8c3a3a}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem 1.5rem;line-height:1.7}
h1{color:var(--white);font-size:1.8rem;border-bottom:2px solid var(--gold);padding-bottom:.5rem}
h2{color:var(--gold)}
a{color:var(--gold)}
.nav{color:var(--dim);font-size:.85rem;margin-bottom:2rem}
.nav a{color:var(--dim)}
button{background:var(--gold);color:var(--bg);border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:1rem;margin:.4rem;transition:all .2s}
button:hover{opacity:.85}
.question-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
.score-card{background:#1a1510;border:2px solid var(--gold);border-radius:8px;padding:2rem;margin:2rem 0;text-align:center}
.score-card h2{font-size:2.5rem;margin:.5rem 0}
.share-btn{background:var(--gold);color:var(--bg);padding:1rem 2rem;border-radius:4px;text-decoration:none;display:inline-block;font-weight:bold;margin:.5rem}
.correct{border-color:var(--correct)}
.wrong{border-color:var(--wrong)}
.hidden{display:none}
.myth-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:2rem;margin:1.5rem 0;text-align:center}
.myth-card .wrong-version{color:var(--wrong);font-size:1.1rem;text-decoration:line-through;opacity:.7}
.myth-card .right-version{color:var(--correct);font-size:1.3rem;margin-top:1rem}
.myth-card .source{color:var(--dim);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="nav"><a href="https://kriosmythology.com">Krios</a> > <a href="https://kriosmythology.com/tools">Tools</a> > Quiz</div>
<h1>How Well Do You Know Medusa?</h1>
<p>5 questions. Primary sources only. Your textbook won't help you here.</p>
<div id="quiz"></div>
<div id="result" class="score-card hidden">
    <p style="color:var(--dim)">YOUR SCORE</p>
    <h2 id="score-display" style="color:var(--gold)"></h2>
    <p id="score-msg"></p>
    <div style="margin-top:1.5rem">
        <a id="share-twitter" class="share-btn" target="_blank">Share on X</a>
        <a id="share-copy" class="share-btn" href="#" onclick="copyScore();return false">Copy Result</a>
    </div>
    <p style="margin-top:1.5rem"><a href="https://youtube.com/@KriosMythology">Watch the full Medusa episode on YouTube →</a></p>
</div>
<script>
const Q = [{"question": "According to the script, what was Athena's specific purpose in transforming Medusa into a monster with a petrifying gaze?", "options": ["To create a general curse that would protect her temple", "To create a targeted weapon specifically for Perseus to use in his quest", "To punish Medusa without any intention of involving Perseus"], "correct": 1, "explanation": "The script states that in older Greek sources, Athena 'transforms her so that anyone who looks at her will turn to stone. Not as a general curse, but as a targeted weapon. Athena was already planning Perseus's quest when she made Medusa into a monster.'"}, {"question": "What detail about Athena's role does the script cite from Apollodorus that changed the narrator's interpretation?", "options": ["Athena created Medusa as punishment but later regretted her actions", "Athena guided Perseus to Medusa and taught him step-by-step instructions on how to use the mirror shield", "Athena warned Perseus about Medusa's power before he encountered her"], "correct": 1, "explanation": "The script references Apollodorus and states: 'Athena guided Perseus not just to Medusa, but taught him exactly how to position the mirror shield. She gave him step-by-step instructions on how to murder her own priestess.'"}, {"question": "According to the script, what pattern does Athena's treatment of Medusa represent?", "options": ["A unique one-time incident specific to Medusa's circumstances", "A common pattern of punishing women who are assaulted and then helping their attackers or attackers' allies", "A deliberate test of hero worthiness that only applies to male heroes"], "correct": 1, "explanation": "The script states: 'I also completely underplayed how common this pattern is in Greek mythology. Athena has a thing for punishing women who get assaulted and then helping their attackers or their attackers' allies. It happens with Cassandra, it happens with the Trojan women, it keeps happening.'"}, {"question": "What is the narrator's main critique of how the Perseus and Medusa story is traditionally told?", "options": ["The story doesn't adequately explain how Medusa obtained her powers", "The story portrays it as being about a brave hero facing a monster, when it's actually about power protecting power", "The story doesn't give enough credit to Medusa for her magical abilities"], "correct": 1, "explanation": "The script argues: 'we keep telling these stories like they're about brave heroes facing terrible monsters, when they're actually about power protecting power. Perseus isn't brave \u2014 he's got divine backup and step-by-step instructions. Medusa isn't a monster \u2014 she's a victim who got turned into a weapon for her own destruction.'"}, {"question": "According to the script, was Medusa's transformation meant to be a coincidental circumstance that Athena later exploited?", "options": ["Yes, Athena only discovered Medusa after the transformation and decided to use her", "No, the transformation and Perseus's quest were planned together from the beginning", "Possibly, but the sources are too unclear to determine Athena's intent"], "correct": 1, "explanation": "The script explicitly rejects the coincidence theory: 'That detail about the timing changes everything... But it's not a coincidence at all. She created the monster specifically so her favorite hero could kill it.'"}];
let current = 0, score = 0, answered = false;
const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function render() {
    if (current >= Q.length) { showResult(); return; }
    const q = Q[current];
    let html = '<div class="question-card"><p style="color:var(--dim)">Question ' + (current+1) + '/' + Q.length + '</p>';
    html += '<h2 style="color:var(--white);font-size:1.2rem">' + q.question + '</h2>';
    html += '<div id="options">';
    q.options.forEach((opt, i) => {
        html += '<button onclick="answer(' + i + ')" id="opt' + i + '">' + opt + '</button><br>';
    });
    html += '</div><p id="explanation" class="hidden" style="margin-top:1rem;color:var(--dim)"></p>';
    html += '<button id="next-btn" class="hidden" onclick="next()" style="margin-top:1rem">Next →</button></div>';
    quizDiv.innerHTML = html;
    answered = false;
}

function answer(i) {
    if (answered) return;
    answered = true;
    const q = Q[current];
    const btns = document.querySelectorAll('#options button');
    btns.forEach((b,j) => {
        b.style.opacity = j === q.correct ? '1' : '0.4';
        if (j === q.correct) b.style.background = '#4a7c59';
        if (j === i && i !== q.correct) b.style.background = '#8c3a3a';
    });
    if (i === q.correct) score++;
    document.getElementById('explanation').textContent = q.explanation;
    document.getElementById('explanation').classList.remove('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function next() { current++; render(); }

function showResult() {
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    document.getElementById('score-display').textContent = score + '/' + Q.length;
    const msgs = ['The primary sources would be disappointed.','Not bad, but Homer expected more.','Solid knowledge. The ancients approve.','Impressive. You read the actual sources.','Perfect. Stavros is proud.'];
    document.getElementById('score-msg').textContent = msgs[score] || msgs[2];
    const shareText = 'I scored ' + score + '/5 on the Medusa mythology quiz. Primary sources only. Can you beat me? https://kriosmythology.com/tools/quiz-ep005-medusa.html';
    document.getElementById('share-twitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function copyScore() {
    const text = 'I scored ' + score + '/5 on the Medusa mythology quiz — @KriosMythology. Can you beat me? kriosmythology.com/tools/quiz-ep005-medusa.html';
    navigator.clipboard.writeText(text).then(() => { document.getElementById('share-copy').textContent = 'Copied!'; });
}

render();
</script>
