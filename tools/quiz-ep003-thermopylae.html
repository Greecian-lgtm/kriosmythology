<style>:root{--bg:#0a0806;--text:#e8d5a0;--gold:#c9a84c;--white:#f5f0e8;--dim:#8a7430;--correct:#4a7c59;--wrong:#8c3a3a}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem 1.5rem;line-height:1.7}
h1{color:var(--white);font-size:1.8rem;border-bottom:2px solid var(--gold);padding-bottom:.5rem}
h2{color:var(--gold)}
a{color:var(--gold)}
.nav{color:var(--dim);font-size:.85rem;margin-bottom:2rem}
.nav a{color:var(--dim)}
button{background:var(--gold);color:var(--bg);border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:1rem;margin:.4rem;transition:all .2s}
button:hover{opacity:.85}
.question-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
.score-card{background:#1a1510;border:2px solid var(--gold);border-radius:8px;padding:2rem;margin:2rem 0;text-align:center}
.score-card h2{font-size:2.5rem;margin:.5rem 0}
.share-btn{background:var(--gold);color:var(--bg);padding:1rem 2rem;border-radius:4px;text-decoration:none;display:inline-block;font-weight:bold;margin:.5rem}
.correct{border-color:var(--correct)}
.wrong{border-color:var(--wrong)}
.hidden{display:none}
.myth-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:2rem;margin:1.5rem 0;text-align:center}
.myth-card .wrong-version{color:var(--wrong);font-size:1.1rem;text-decoration:line-through;opacity:.7}
.myth-card .right-version{color:var(--correct);font-size:1.3rem;margin-top:1rem}
.myth-card .source{color:var(--dim);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="nav"><a href="https://kriosmythology.com">Krios</a> > <a href="https://kriosmythology.com/tools">Tools</a> > Quiz</div>
<h1>How Well Do You Know Thermopylae?</h1>
<p>5 questions. Primary sources only. Your textbook won't help you here.</p>
<div id="quiz"></div>
<div id="result" class="score-card hidden">
    <p style="color:var(--dim)">YOUR SCORE</p>
    <h2 id="score-display" style="color:var(--gold)"></h2>
    <p id="score-msg"></p>
    <div style="margin-top:1.5rem">
        <a id="share-twitter" class="share-btn" target="_blank">Share on X</a>
        <a id="share-copy" class="share-btn" href="#" onclick="copyScore();return false">Copy Result</a>
    </div>
    <p style="margin-top:1.5rem"><a href="https://youtube.com/@KriosMythology">Watch the full Thermopylae episode on YouTube →</a></p>
</div>
<script>
const Q = [{"question": "According to the script, when did Ephialtes betray the exact location of the Anopaea path to the Persians?", "options": ["Before the battle began, allowing Leonidas to plan a last stand from day one", "On the second day of fighting, suggesting Leonidas was initially trying to hold the pass", "During the final hours, giving the Greeks no time to react"], "correct": 1, "explanation": "The script states: 'Ephialtes only betrayed its exact location on the second day of fighting. That timing matters because it suggests Leonidas wasn't planning a glorious last stand from day one\u2014he was genuinely trying to hold the pass until he learned the Persians had found their way around.' This contradicts the common misconception that Leonidas knew the end was inevitable from the start."}, {"question": "How many Thespians chose to stay and die at Thermopylae alongside the Spartans?", "options": ["Approximately 200 warriors from their auxiliary forces", "700, representing their entire military-age male population", "1,000, equal to the Spartan contingent"], "correct": 1, "explanation": "The script explicitly states: 'Seven hundred Thespians chose to stay. That's their entire military-age male population. Their city never recovered, but somehow we only remember the 300.' This highlights how historical narratives erase significant contributors to the battle."}, {"question": "When was Simonides' famous epitaph 'Go tell the Spartans' written relative to the battle?", "options": ["Centuries later as folklore evolved into legend", "Within months of the battle, as deliberate propaganda", "Several decades later during the Peloponnesian War"], "correct": 1, "explanation": "The script clarifies: 'Simonides was writing his famous epitaph\u2014\"Go tell the Spartans\"\u2014within months of the battle. This wasn't some organic folk tale that grew over centuries. It was deliberate propaganda from the start, crafted while Athens and Sparta were still technically allies.'"}, {"question": "What does the script suggest about Leonidas' original battle strategy at Thermopylae?", "options": ["He planned a suicidal last stand to achieve immortal glory", "He was trying to hold the pass until learning the Persians found a flanking route", "He intended to retreat once the Anopaea path was discovered"], "correct": 1, "explanation": "The script argues: 'It suggests Leonidas wasn't planning a glorious last stand from day one\u2014he was genuinely trying to hold the pass until he learned the Persians had found their way around.' This challenges the romanticized narrative of inevitable martyrdom."}, {"question": "According to the script, what was Xerxes' reaction to the Spartan resistance on the final day?", "options": ["He was humiliated and ordered the immediate destruction of Sparta", "He was genuinely impressed by their resistance despite having military superiority", "He remained indifferent, viewing the Greeks as insignificant"], "correct": 1, "explanation": "The script states: 'Persian sources, filtered through much later writers, suggest he was genuinely impressed by the Spartan resistance.' The script notes the absurdity of this: 'There's something almost absurd about a god-king setting up lawn furniture to watch three hundred men die rather than just... walking around them.'"}];
let current = 0, score = 0, answered = false;
const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function render() {
    if (current >= Q.length) { showResult(); return; }
    const q = Q[current];
    let html = '<div class="question-card"><p style="color:var(--dim)">Question ' + (current+1) + '/' + Q.length + '</p>';
    html += '<h2 style="color:var(--white);font-size:1.2rem">' + q.question + '</h2>';
    html += '<div id="options">';
    q.options.forEach((opt, i) => {
        html += '<button onclick="answer(' + i + ')" id="opt' + i + '">' + opt + '</button><br>';
    });
    html += '</div><p id="explanation" class="hidden" style="margin-top:1rem;color:var(--dim)"></p>';
    html += '<button id="next-btn" class="hidden" onclick="next()" style="margin-top:1rem">Next →</button></div>';
    quizDiv.innerHTML = html;
    answered = false;
}

function answer(i) {
    if (answered) return;
    answered = true;
    const q = Q[current];
    const btns = document.querySelectorAll('#options button');
    btns.forEach((b,j) => {
        b.style.opacity = j === q.correct ? '1' : '0.4';
        if (j === q.correct) b.style.background = '#4a7c59';
        if (j === i && i !== q.correct) b.style.background = '#8c3a3a';
    });
    if (i === q.correct) score++;
    document.getElementById('explanation').textContent = q.explanation;
    document.getElementById('explanation').classList.remove('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function next() { current++; render(); }

function showResult() {
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    document.getElementById('score-display').textContent = score + '/' + Q.length;
    const msgs = ['The primary sources would be disappointed.','Not bad, but Homer expected more.','Solid knowledge. The ancients approve.','Impressive. You read the actual sources.','Perfect. Stavros is proud.'];
    document.getElementById('score-msg').textContent = msgs[score] || msgs[2];
    const shareText = 'I scored ' + score + '/5 on the Thermopylae mythology quiz. Primary sources only. Can you beat me? https://kriosmythology.com/tools/quiz-ep003-thermopylae.html';
    document.getElementById('share-twitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function copyScore() {
    const text = 'I scored ' + score + '/5 on the Thermopylae mythology quiz — @KriosMythology. Can you beat me? kriosmythology.com/tools/quiz-ep003-thermopylae.html';
    navigator.clipboard.writeText(text).then(() => { document.getElementById('share-copy').textContent = 'Copied!'; });
}

render();
</script>
