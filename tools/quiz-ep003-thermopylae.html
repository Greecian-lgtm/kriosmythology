<html lang="en">
<head>
<meta charset="UTF-8">

<title>Quiz: How Well Do You Know Thermopylae? | Krios Mythology</title>
<meta name="description" content="Test your knowledge of Thermopylae from Greek mythology. 5 questions based on primary sources, not textbooks.">
<meta property="og:title" content="I scored _/5 on the Thermopylae quiz — Krios Mythology">

<style>:root{--bg:#0a0806;--text:#e8d5a0;--gold:#c9a84c;--white:#f5f0e8;--dim:#8a7430;--correct:#4a7c59;--wrong:#8c3a3a}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem 1.5rem;line-height:1.7}
h1{color:var(--white);font-size:1.8rem;border-bottom:2px solid var(--gold);padding-bottom:.5rem}
h2{color:var(--gold)}
a{color:var(--gold)}
.nav{color:var(--dim);font-size:.85rem;margin-bottom:2rem}
.nav a{color:var(--dim)}
button{background:var(--gold);color:var(--bg);border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:1rem;margin:.4rem;transition:all .2s}
button:hover{opacity:.85}
.question-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
.score-card{background:#1a1510;border:2px solid var(--gold);border-radius:8px;padding:2rem;margin:2rem 0;text-align:center}
.score-card h2{font-size:2.5rem;margin:.5rem 0}
.share-btn{background:var(--gold);color:var(--bg);padding:1rem 2rem;border-radius:4px;text-decoration:none;display:inline-block;font-weight:bold;margin:.5rem}
.correct{border-color:var(--correct)}
.wrong{border-color:var(--wrong)}
.hidden{display:none}
.myth-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:2rem;margin:1.5rem 0;text-align:center}
.myth-card .wrong-version{color:var(--wrong);font-size:1.1rem;text-decoration:line-through;opacity:.7}
.myth-card .right-version{color:var(--correct);font-size:1.3rem;margin-top:1rem}
.myth-card .source{color:var(--dim);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="nav"><a href="https://kriosmythology.com">Krios</a> > <a href="https://kriosmythology.com/tools">Tools</a> > Quiz</div>
<h1>How Well Do You Know Thermopylae?</h1>
<p>5 questions. Primary sources only. Your textbook won't help you here.</p>
<div id="quiz"></div>
<div id="result" class="score-card hidden">
    <p style="color:var(--dim)">YOUR SCORE</p>
    <h2 id="score-display" style="color:var(--gold)"></h2>
    <p id="score-msg"></p>
    <div style="margin-top:1.5rem">
        <a id="share-twitter" class="share-btn" target="_blank">Share on X</a>
        <a id="share-copy" class="share-btn" href="#" onclick="copyScore();return false">Copy Result</a>
    </div>
    <p style="margin-top:1.5rem"><a href="https://youtube.com/@KriosMythology">Watch the full Thermopylae episode on YouTube →</a></p>
</div>
<script>
const Q = [{"question": "According to the script, when did Ephialtes betray the exact location of the Anopaea path to the Persians?", "options": ["Before the battle began", "On the second day of fighting", "After Leonidas had already decided to make his final stand"], "correct": 1, "explanation": "The script states that while Herodotus says the Spartans knew about the Anopaea path from the beginning, Ephialtes only betrayed its exact location on the second day of fighting. This timing suggests Leonidas wasn't planning a glorious last stand from day one."}, {"question": "How many Thespians chose to stay and die at Thermopylae according to the script?", "options": ["300", "700", "1000"], "correct": 1, "explanation": "The script explicitly states 'Seven hundred Thespians chose to stay. That's their entire military-age male population.' Yet they have been largely forgotten in popular retellings of the battle."}, {"question": "When was Simonides' famous epitaph 'Go tell the Spartans' written in relation to the battle?", "options": ["Several centuries after the battle", "Within months of the battle", "More than a decade later"], "correct": 1, "explanation": "The script emphasizes that Simonides wrote his famous epitaph within months of the battle, describing it as deliberate propaganda from the start rather than an organic folk tale that grew over centuries."}, {"question": "What did Xerxes apparently do while watching the final day of Thermopylae unfold?", "options": ["Led his troops in a direct assault on the Greeks", "Sat on a throne observing the battle", "Fled back to Persia in fear"], "correct": 1, "explanation": "According to the script, Persian sources suggest Xerxes sat on a throne watching the final day unfold and was genuinely impressed by the Spartan resistance, rather than simply walking around the pass."}, {"question": "What mistake does the narrator admit to making in their previous telling of Thermopylae?", "options": ["Claiming the Thespians didn't actually fight at the battle", "Trusting Herodotus too much about when Leonidas knew of the flanking route", "Overemphasizing how quickly the legend was weaponized"], "correct": 1, "explanation": "The script opens with the narrator stating 'I made the mistake of trusting Herodotus a bit too much when I said the Spartans knew about the flanking route before Leonidas made his final decision,' explaining the actual timeline was more complex."}];
let current = 0, score = 0, answered = false;
const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function render() {
    if (current >= Q.length) { showResult(); return; }
    const q = Q[current];
    let html = '<div class="question-card"><p style="color:var(--dim)">Question ' + (current+1) + '/' + Q.length + '</p>';
    html += '<h2 style="color:var(--white);font-size:1.2rem">' + q.question + '</h2>';
    html += '<div id="options">';
    q.options.forEach((opt, i) => {
        html += '<button onclick="answer(' + i + ')" id="opt' + i + '">' + opt + '</button><br>';
    });
    html += '</div><p id="explanation" class="hidden" style="margin-top:1rem;color:var(--dim)"></p>';
    html += '<button id="next-btn" class="hidden" onclick="next()" style="margin-top:1rem">Next →</button></div>';
    quizDiv.innerHTML = html;
    answered = false;
}

function answer(i) {
    if (answered) return;
    answered = true;
    const q = Q[current];
    const btns = document.querySelectorAll('#options button');
    btns.forEach((b,j) => {
        b.style.opacity = j === q.correct ? '1' : '0.4';
        if (j === q.correct) b.style.background = '#4a7c59';
        if (j === i && i !== q.correct) b.style.background = '#8c3a3a';
    });
    if (i === q.correct) score++;
    document.getElementById('explanation').textContent = q.explanation;
    document.getElementById('explanation').classList.remove('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function next() { current++; render(); }

function showResult() {
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    document.getElementById('score-display').textContent = score + '/' + Q.length;
    const msgs = ['The primary sources would be disappointed.','Not bad, but Homer expected more.','Solid knowledge. The ancients approve.','Impressive. You read the actual sources.','Perfect. Stavros is proud.'];
    document.getElementById('score-msg').textContent = msgs[score] || msgs[2];
    const shareText = 'I scored ' + score + '/5 on the Thermopylae mythology quiz. Primary sources only. Can you beat me? https://kriosmythology.com/tools/quiz-ep003-thermopylae.html';
    document.getElementById('share-twitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function copyScore() {
    const text = 'I scored ' + score + '/5 on the Thermopylae mythology quiz — @KriosMythology. Can you beat me? kriosmythology.com/tools/quiz-ep003-thermopylae.html';
    navigator.clipboard.writeText(text).then(() => { document.getElementById('share-copy').textContent = 'Copied!'; });
}

render();
</script>
