<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quiz: How Well Do You Know Troy? | Krios Mythology</title>
<meta name="description" content="Test your knowledge of Troy from Greek mythology. 5 questions based on primary sources, not textbooks.">
<meta property="og:title" content="I scored _/5 on the Troy quiz — Krios Mythology">
<meta property="og:url" content="https://kriosmythology.com/tools/quiz-ep006-troy.html">
<style>:root{--bg:#0a0806;--text:#e8d5a0;--gold:#c9a84c;--white:#f5f0e8;--dim:#8a7430;--correct:#4a7c59;--wrong:#8c3a3a}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem 1.5rem;line-height:1.7}
h1{color:var(--white);font-size:1.8rem;border-bottom:2px solid var(--gold);padding-bottom:.5rem}
h2{color:var(--gold)}
a{color:var(--gold)}
.nav{color:var(--dim);font-size:.85rem;margin-bottom:2rem}
.nav a{color:var(--dim)}
button{background:var(--gold);color:var(--bg);border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:1rem;margin:.4rem;transition:all .2s}
button:hover{opacity:.85}
.question-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
.score-card{background:#1a1510;border:2px solid var(--gold);border-radius:8px;padding:2rem;margin:2rem 0;text-align:center}
.score-card h2{font-size:2.5rem;margin:.5rem 0}
.share-btn{background:var(--gold);color:var(--bg);padding:1rem 2rem;border-radius:4px;text-decoration:none;display:inline-block;font-weight:bold;margin:.5rem}
.correct{border-color:var(--correct)}
.wrong{border-color:var(--wrong)}
.hidden{display:none}
.myth-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:2rem;margin:1.5rem 0;text-align:center}
.myth-card .wrong-version{color:var(--wrong);font-size:1.1rem;text-decoration:line-through;opacity:.7}
.myth-card .right-version{color:var(--correct);font-size:1.3rem;margin-top:1rem}
.myth-card .source{color:var(--dim);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="nav"><a href="https://kriosmythology.com">Krios</a> > <a href="https://kriosmythology.com/tools">Tools</a> > Quiz</div>
<h1>How Well Do You Know Troy?</h1>
<p>5 questions. Primary sources only. Your textbook won't help you here.</p>
<div id="quiz"></div>
<div id="result" class="score-card hidden">
    <p style="color:var(--dim)">YOUR SCORE</p>
    <h2 id="score-display" style="color:var(--gold)"></h2>
    <p id="score-msg"></p>
    <div style="margin-top:1.5rem">
        <a id="share-twitter" class="share-btn" target="_blank">Share on X</a>
        <a id="share-copy" class="share-btn" href="#" onclick="copyScore();return false">Copy Result</a>
    </div>
    <p style="margin-top:1.5rem"><a href="https://youtube.com/@KriosMythology">Watch the full Troy episode on YouTube →</a></p>
</div>
<script>
const Q = [{"question": "According to the script, what is the primary reason the Greek coalition mobilized for war against Troy?", "options": ["To recover Helen out of love for her beauty", "Because Paris violated xenia by breaking the sacred host-guest covenant", "To expand Greek territory and establish trade dominance"], "correct": 1, "explanation": "Stavros explicitly states: 'The entire Greek coalition doesn't mobilise over a love affair. They mobilise because the sacred bond between host and guest has been publicly desecrated and gone unanswered.' Paris violated xenia by eating Menelaus's food, accepting his protection, and then taking his wife."}, {"question": "What divine authority enforced the obligation of xenia?", "options": ["Athena, goddess of wisdom and warfare", "Zeus himself", "Hermes, god of travelers and boundaries"], "correct": 1, "explanation": "The script states: 'Xenia was a sacred obligation \u2014 a covenant between host and guest enforced by Zeus himself.' This emphasizes that xenia was divine law, not merely social custom."}, {"question": "How does the Iliad actually end?", "options": ["With the Greek soldiers entering Troy through the wooden horse", "With Achilles defeating Hector and the Greeks celebrating victory", "With the funeral of Hector, a Trojan"], "correct": 2, "explanation": "Stavros explains: 'The Iliad ends before Troy falls. Homer doesn't show you the wooden horse... The poem ends with the funeral of Hector. A Trojan funeral. The last image Homer gives us is not Greek victory \u2014 it's Trojan grief.'"}, {"question": "Why does Homer deliberately end the Iliad on the losing side rather than showing Greek victory?", "options": ["Because he was secretly pro-Trojan and wanted to undermine the Greek narrative", "Because he understood that there is no clean victory and wanted to show the true cost of war", "Because the wooden horse story was not yet invented in his time"], "correct": 1, "explanation": "The script states: 'He put it in the structure of the poem itself... Not because he was pro-Trojan. Because he understood something that most war stories refuse to admit. There is no clean victory.' Homer shows Trojan grief to illustrate that winning destroyed the Greeks anyway."}, {"question": "What key difference does the script identify between xenia and modern hospitality?", "options": ["Xenia required longer visits from guests", "Hospitality is something you choose, while xenia was something you owed as divine law", "Xenia only applied to royalty and nobility"], "correct": 1, "explanation": "Stavros directly states: 'No English word carries that weight. Hospitality is something you choose. Xenia was something you owed.' This emphasizes that xenia was a binding obligation enforced by Zeus, not a voluntary courtesy."}];
let current = 0, score = 0, answered = false;
const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function render() {
    if (current >= Q.length) { showResult(); return; }
    const q = Q[current];
    let html = '<div class="question-card"><p style="color:var(--dim)">Question ' + (current+1) + '/' + Q.length + '</p>';
    html += '<h2 style="color:var(--white);font-size:1.2rem">' + q.question + '</h2>';
    html += '<div id="options">';
    q.options.forEach((opt, i) => {
        html += '<button onclick="answer(' + i + ')" id="opt' + i + '">' + opt + '</button><br>';
    });
    html += '</div><p id="explanation" class="hidden" style="margin-top:1rem;color:var(--dim)"></p>';
    html += '<button id="next-btn" class="hidden" onclick="next()" style="margin-top:1rem">Next →</button></div>';
    quizDiv.innerHTML = html;
    answered = false;
}

function answer(i) {
    if (answered) return;
    answered = true;
    const q = Q[current];
    const btns = document.querySelectorAll('#options button');
    btns.forEach((b,j) => {
        b.style.opacity = j === q.correct ? '1' : '0.4';
        if (j === q.correct) b.style.background = '#4a7c59';
        if (j === i && i !== q.correct) b.style.background = '#8c3a3a';
    });
    if (i === q.correct) score++;
    document.getElementById('explanation').textContent = q.explanation;
    document.getElementById('explanation').classList.remove('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function next() { current++; render(); }

function showResult() {
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    document.getElementById('score-display').textContent = score + '/' + Q.length;
    const msgs = ['The primary sources would be disappointed.','Not bad, but Homer expected more.','Solid knowledge. The ancients approve.','Impressive. You read the actual sources.','Perfect. Stavros is proud.'];
    document.getElementById('score-msg').textContent = msgs[score] || msgs[2];
    const shareText = 'I scored ' + score + '/5 on the Troy mythology quiz. Primary sources only. Can you beat me? https://kriosmythology.com/tools/quiz-ep006-troy.html';
    document.getElementById('share-twitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function copyScore() {
    const text = 'I scored ' + score + '/5 on the Troy mythology quiz — @KriosMythology. Can you beat me? kriosmythology.com/tools/quiz-ep006-troy.html';
    navigator.clipboard.writeText(text).then(() => { document.getElementById('share-copy').textContent = 'Copied!'; });
}

render();
</script>

</body></html>
