<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quiz: How Well Do You Know Odysseus? | Krios Mythology</title>
<meta name="description" content="Test your knowledge of Odysseus from Greek mythology. 5 questions based on primary sources, not textbooks.">
<meta property="og:title" content="I scored _/5 on the Odysseus quiz — Krios Mythology">

<style>:root{--bg:#0a0806;--text:#e8d5a0;--gold:#c9a84c;--white:#f5f0e8;--dim:#8a7430;--correct:#4a7c59;--wrong:#8c3a3a}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem 1.5rem;line-height:1.7}
h1{color:var(--white);font-size:1.8rem;border-bottom:2px solid var(--gold);padding-bottom:.5rem}
h2{color:var(--gold)}
a{color:var(--gold)}
.nav{color:var(--dim);font-size:.85rem;margin-bottom:2rem}
.nav a{color:var(--dim)}
button{background:var(--gold);color:var(--bg);border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:1rem;margin:.4rem;transition:all .2s}
button:hover{opacity:.85}
.question-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
.score-card{background:#1a1510;border:2px solid var(--gold);border-radius:8px;padding:2rem;margin:2rem 0;text-align:center}
.score-card h2{font-size:2.5rem;margin:.5rem 0}
.share-btn{background:var(--gold);color:var(--bg);padding:1rem 2rem;border-radius:4px;text-decoration:none;display:inline-block;font-weight:bold;margin:.5rem}
.correct{border-color:var(--correct)}
.wrong{border-color:var(--wrong)}
.hidden{display:none}
.myth-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:2rem;margin:1.5rem 0;text-align:center}
.myth-card .wrong-version{color:var(--wrong);font-size:1.1rem;text-decoration:line-through;opacity:.7}
.myth-card .right-version{color:var(--correct);font-size:1.3rem;margin-top:1rem}
.myth-card .source{color:var(--dim);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="nav"><a href="https://kriosmythology.com">Krios</a> > <a href="https://kriosmythology.com/tools">Tools</a> > Quiz</div>
<h1>How Well Do You Know Odysseus?</h1>
<p>5 questions. Primary sources only. Your textbook won't help you here.</p>
<div id="quiz"></div>
<div id="result" class="score-card hidden">
    <p style="color:var(--dim)">YOUR SCORE</p>
    <h2 id="score-display" style="color:var(--gold)"></h2>
    <p id="score-msg"></p>
    <div style="margin-top:1.5rem">
        <a id="share-twitter" class="share-btn" target="_blank">Share on X</a>
        <a id="share-copy" class="share-btn" href="#" onclick="copyScore();return false">Copy Result</a>
    </div>
    <p style="margin-top:1.5rem"><a href="https://youtube.com/@KriosMythology">Watch the full Odysseus episode on YouTube →</a></p>
</div>
<script>
const Q = [{"question": "According to the script, when did ancient readers first recognize Odysseus as a darker character than a traditional hero?", "options": ["In the 1960s when modern scholars made this discovery", "During ancient Roman times, two thousand years ago", "Only after modern translations were published in the 20th century"], "correct": 1, "explanation": "The script states that 'The Romans especially \u2014 they saw right through Odysseus' and 'This wasn't some secret scholarly discovery from the 1960s that I was bringing to light. The ancients were having this debate two thousand years ago.' Virgil and Cicero both critiqued Odysseus in their ancient works."}, {"question": "What does the script reveal about the translation of 'polytropos' in modern versions?", "options": ["All modern translations intentionally soften the original meaning to make Odysseus seem better", "Some 'softened' translations like 'resourceful' are actually more accurate than harsher interpretations", "Modern translators consistently avoid using the word cunning to describe Odysseus"], "correct": 1, "explanation": "The script states: 'some of the \"softened\" modern translations I complained about are actually more accurate than the harsher ones I preferred. \"Resourceful\" isn't always a cop-out translation of polytropos. Sometimes cunning really is morally neutral in the original Greek.'"}, {"question": "What Greek word does Homer use to describe Odysseus's emotion while grinning over the dead suitors?", "options": ["Chara (joy)", "Dikaiosyne (justice)", "Gethosyne (savage joy)"], "correct": 2, "explanation": "The script specifically states: 'The word he uses \u2014 gethosyne \u2014 it's not satisfaction or justice. It's joy. Savage joy.' This demonstrates that Odysseus experiences primal satisfaction rather than righteous justice."}, {"question": "How does Penelope respond when she first sees Odysseus after the suitors are killed?", "options": ["She immediately recognizes and embraces him", "She is genuinely afraid of him and tests him with the bed", "She celebrates his victory with him over the corpses"], "correct": 1, "explanation": "The script notes: 'Penelope literally doesn't recognize this man who's supposedly her husband' and 'she's genuinely afraid of him. She's seen what he did to a hundred men in her house.' The bed test is her way of verifying his identity while fearful."}, {"question": "What interpretation does the script suggest about Odysseus's character after killing the suitors?", "options": ["He became a monster only because of his twenty-year separation from home", "He was fundamentally changed by his hardships into an unrecognizable person", "He may not have changed at all, and the horror is that he was always this way"], "correct": 2, "explanation": "The script concludes: 'what if the real horror of the Odyssey isn't that Odysseus changed, but that he didn't?' This suggests his capacity for violence and savagery may have been inherent to his character all along."}];
let current = 0, score = 0, answered = false;
const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function render() {
    if (current >= Q.length) { showResult(); return; }
    const q = Q[current];
    let html = '<div class="question-card"><p style="color:var(--dim)">Question ' + (current+1) + '/' + Q.length + '</p>';
    html += '<h2 style="color:var(--white);font-size:1.2rem">' + q.question + '</h2>';
    html += '<div id="options">';
    q.options.forEach((opt, i) => {
        html += '<button onclick="answer(' + i + ')" id="opt' + i + '">' + opt + '</button><br>';
    });
    html += '</div><p id="explanation" class="hidden" style="margin-top:1rem;color:var(--dim)"></p>';
    html += '<button id="next-btn" class="hidden" onclick="next()" style="margin-top:1rem">Next →</button></div>';
    quizDiv.innerHTML = html;
    answered = false;
}

function answer(i) {
    if (answered) return;
    answered = true;
    const q = Q[current];
    const btns = document.querySelectorAll('#options button');
    btns.forEach((b,j) => {
        b.style.opacity = j === q.correct ? '1' : '0.4';
        if (j === q.correct) b.style.background = '#4a7c59';
        if (j === i && i !== q.correct) b.style.background = '#8c3a3a';
    });
    if (i === q.correct) score++;
    document.getElementById('explanation').textContent = q.explanation;
    document.getElementById('explanation').classList.remove('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function next() { current++; render(); }

function showResult() {
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    document.getElementById('score-display').textContent = score + '/' + Q.length;
    const msgs = ['The primary sources would be disappointed.','Not bad, but Homer expected more.','Solid knowledge. The ancients approve.','Impressive. You read the actual sources.','Perfect. Stavros is proud.'];
    document.getElementById('score-msg').textContent = msgs[score] || msgs[2];
    const shareText = 'I scored ' + score + '/5 on the Odysseus mythology quiz. Primary sources only. Can you beat me? https://kriosmythology.com/tools/quiz-ep002-odysseus.html';
    document.getElementById('share-twitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function copyScore() {
    const text = 'I scored ' + score + '/5 on the Odysseus mythology quiz — @KriosMythology. Can you beat me? kriosmythology.com/tools/quiz-ep002-odysseus.html';
    navigator.clipboard.writeText(text).then(() => { document.getElementById('share-copy').textContent = 'Copied!'; });
}

render();
</script>
