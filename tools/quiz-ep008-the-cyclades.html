<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quiz: How Well Do You Know The Cyclades? | Krios Mythology</title>
<meta name="description" content="Test your knowledge of The Cyclades from Greek mythology. 5 questions based on primary sources, not textbooks.">
<meta property="og:title" content="I scored _/5 on the The Cyclades quiz — Krios Mythology">

<style>:root{--bg:#0a0806;--text:#e8d5a0;--gold:#c9a84c;--white:#f5f0e8;--dim:#8a7430;--correct:#4a7c59;--wrong:#8c3a3a}
body{background:var(--bg);color:var(--text);font-family:Georgia,serif;max-width:720px;margin:0 auto;padding:2rem 1.5rem;line-height:1.7}
h1{color:var(--white);font-size:1.8rem;border-bottom:2px solid var(--gold);padding-bottom:.5rem}
h2{color:var(--gold)}
a{color:var(--gold)}
.nav{color:var(--dim);font-size:.85rem;margin-bottom:2rem}
.nav a{color:var(--dim)}
button{background:var(--gold);color:var(--bg);border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:1rem;margin:.4rem;transition:all .2s}
button:hover{opacity:.85}
.question-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:1.5rem;margin:1.5rem 0}
.score-card{background:#1a1510;border:2px solid var(--gold);border-radius:8px;padding:2rem;margin:2rem 0;text-align:center}
.score-card h2{font-size:2.5rem;margin:.5rem 0}
.share-btn{background:var(--gold);color:var(--bg);padding:1rem 2rem;border-radius:4px;text-decoration:none;display:inline-block;font-weight:bold;margin:.5rem}
.correct{border-color:var(--correct)}
.wrong{border-color:var(--wrong)}
.hidden{display:none}
.myth-card{background:#1a1510;border:1px solid var(--gold);border-radius:8px;padding:2rem;margin:1.5rem 0;text-align:center}
.myth-card .wrong-version{color:var(--wrong);font-size:1.1rem;text-decoration:line-through;opacity:.7}
.myth-card .right-version{color:var(--correct);font-size:1.3rem;margin-top:1rem}
.myth-card .source{color:var(--dim);font-size:.85rem;margin-top:.5rem}
</style>
</head>
<body>
<div class="nav"><a href="https://kriosmythology.com">Krios</a> > <a href="https://kriosmythology.com/tools">Tools</a> > Quiz</div>
<h1>How Well Do You Know The Cyclades?</h1>
<p>5 questions. Primary sources only. Your textbook won't help you here.</p>
<div id="quiz"></div>
<div id="result" class="score-card hidden">
    <p style="color:var(--dim)">YOUR SCORE</p>
    <h2 id="score-display" style="color:var(--gold)"></h2>
    <p id="score-msg"></p>
    <div style="margin-top:1.5rem">
        <a id="share-twitter" class="share-btn" target="_blank">Share on X</a>
        <a id="share-copy" class="share-btn" href="#" onclick="copyScore();return false">Copy Result</a>
    </div>
    <p style="margin-top:1.5rem"><a href="https://youtube.com/@KriosMythology">Watch the full The Cyclades episode on YouTube →</a></p>
</div>
<script>
const Q = [{"question": "According to the script, what was already a thousand years old when classical Greece began?", "options": ["The Parian marble quarry where the Venus de Milo was sculpted", "The temple of Apollo on Delos", "The Cycladic figurine fragments found on Keros"], "correct": 0, "explanation": "The script states: 'It came from a Parian marble quarry that was already a thousand years old when classical Greece began.' This corrects the common misconception that the Venus de Milo was created in Athens."}, {"question": "What physical evidence did the author find in the Nymphaion that revealed ancient workers' spiritual practice?", "options": ["Broken marble fragments stacked in ritual patterns", "Lamp niches carved into the rock face with soot still visible on the ceiling", "Linear B tablets inscribed with prayers to the gods"], "correct": 1, "explanation": "The script describes: 'Deep inside, cut into the rock face, are lamp niches. Small carved hollows where workers left oil lamps burning before they lifted the stone. One of them still has the soot on the ceiling above it.' The author reflects that 'The offering and the extraction were the same act.'"}, {"question": "What was unique about how Cycladic figurine fragments reached Keros around 2700 BCE?", "options": ["They were naturally broken and washed ashore by waves over centuries", "They were broken deliberately on their home islands, then transported by boat and deposited there", "They were broken during a single catastrophic volcanic eruption on Keros"], "correct": 1, "explanation": "The script explicitly states: 'They weren't broken accidentally. They were broken deliberately, on their home islands, and then the pieces were carried by boat to Keros and deposited there.' The fragments came from islands up to 50 kilometres apart, indicating coordinated ritual action."}, {"question": "According to Linear B tablets, when was Delos already recognized as a sacred site?", "options": ["Around 2700 BCE, during the Early Bronze Age", "Around 1400 BCE, during the Mycenaean period", "Around 776 BCE, at the beginning of classical Greece"], "correct": 1, "explanation": "The script states: 'Linear B tablets \u2014 the earliest written Greek, Mycenaean, around 1400 BCE \u2014 already reference Delos as a sacred site.' This predates classical Greece but is much later than the Keros ritual deposits."}, {"question": "What paradoxical restriction made Delos religiously and politically significant in ancient Greece?", "options": ["No one was allowed to visit the island except during specific festival days", "It was a three-kilometre rock in the middle of the Aegean where nobody could be born or die", "Only wealthy aristocrats were permitted to make offerings at its temples"], "correct": 1, "explanation": "The script poses this as a central question: 'why did the ancient Greeks concentrate so much of their religious and political power on a three-kilometre rock in the middle of the Aegean that nobody could be born or die on?' This unique restriction is presented as key to understanding Delos's significance."}];
let current = 0, score = 0, answered = false;
const quizDiv = document.getElementById('quiz');
const resultDiv = document.getElementById('result');

function render() {
    if (current >= Q.length) { showResult(); return; }
    const q = Q[current];
    let html = '<div class="question-card"><p style="color:var(--dim)">Question ' + (current+1) + '/' + Q.length + '</p>';
    html += '<h2 style="color:var(--white);font-size:1.2rem">' + q.question + '</h2>';
    html += '<div id="options">';
    q.options.forEach((opt, i) => {
        html += '<button onclick="answer(' + i + ')" id="opt' + i + '">' + opt + '</button><br>';
    });
    html += '</div><p id="explanation" class="hidden" style="margin-top:1rem;color:var(--dim)"></p>';
    html += '<button id="next-btn" class="hidden" onclick="next()" style="margin-top:1rem">Next →</button></div>';
    quizDiv.innerHTML = html;
    answered = false;
}

function answer(i) {
    if (answered) return;
    answered = true;
    const q = Q[current];
    const btns = document.querySelectorAll('#options button');
    btns.forEach((b,j) => {
        b.style.opacity = j === q.correct ? '1' : '0.4';
        if (j === q.correct) b.style.background = '#4a7c59';
        if (j === i && i !== q.correct) b.style.background = '#8c3a3a';
    });
    if (i === q.correct) score++;
    document.getElementById('explanation').textContent = q.explanation;
    document.getElementById('explanation').classList.remove('hidden');
    document.getElementById('next-btn').classList.remove('hidden');
}

function next() { current++; render(); }

function showResult() {
    quizDiv.classList.add('hidden');
    resultDiv.classList.remove('hidden');
    document.getElementById('score-display').textContent = score + '/' + Q.length;
    const msgs = ['The primary sources would be disappointed.','Not bad, but Homer expected more.','Solid knowledge. The ancients approve.','Impressive. You read the actual sources.','Perfect. Stavros is proud.'];
    document.getElementById('score-msg').textContent = msgs[score] || msgs[2];
    const shareText = 'I scored ' + score + '/5 on the The Cyclades mythology quiz. Primary sources only. Can you beat me? https://kriosmythology.com/tools/quiz-ep008-the-cyclades.html';
    document.getElementById('share-twitter').href = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText);
}

function copyScore() {
    const text = 'I scored ' + score + '/5 on the The Cyclades mythology quiz — @KriosMythology. Can you beat me? kriosmythology.com/tools/quiz-ep008-the-cyclades.html';
    navigator.clipboard.writeText(text).then(() => { document.getElementById('share-copy').textContent = 'Copied!'; });
}

render();
</script>
